<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Savong Dice Roller</title>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            min-height: 100vh; 
            margin: 0; 
            background-color: #1a1a1a; 
            color: #f0f0f0; 
            font-family: sans-serif; 
            padding: 40px 20px;
            text-align: center;
        }

        header h1 { color: #ffcc00; margin: 0; font-size: 1.8rem; }
        .subtitle { margin: 10px 0; font-size: 1rem; opacity: 0.8; }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 30px;
        }

        .dice-container { display: flex; gap: 20px; justify-content: center; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .die-wrapper span { font-size: 0.9rem; font-weight: bold; letter-spacing: 2px; }

        .dice { 
            width: 140px; 
            height: 140px; 
            background-color: #333; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.8rem; 
            font-weight: bold; 
            border-radius: 20px; 
            border: 3px solid transparent; 
            cursor: not-allowed; 
            opacity: 0.4; 
            transition: 0.3s; 
            padding: 10px; 
            overflow: hidden;
        }

        .dice.active { 
            background-color: #444; 
            cursor: pointer; 
            opacity: 1; 
            border-color: #ffcc00; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); 
        }

        .dice.rolled { 
            background-color: #f0f0f0; 
            color: #1a1a1a; 
            opacity: 1; 
            cursor: default; 
        }

        .result-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .result-content img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            display: block;
            margin-bottom: 8px;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
        }
        
        .rolling { animation: shake 0.1s infinite; background-color: #ffcc00 !important; color: #000 !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        
        button { 
            padding: 12px 40px; 
            background: transparent; 
            color: #ffcc00; 
            border: 2px solid #ffcc00; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #ffcc00; color: #1a1a1a; }
        
        footer { font-size: 0.7rem; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>SAVONG</h1>
        <div class="subtitle">UNLIRISE NEU-PILIPINO</div>
    </header>

    <div class="main-content">
        <div class="dice-container">
            <div class="die-wrapper">
                <span>SALA</span>
                <div id="die-0" class="dice active" onclick="rollDice(0)">TAP TO FILTER</div>
            </div>
            <div class="die-wrapper">
                <span>PILI</span>
                <div id="die-1" class="dice" onclick="rollDice(1)">LOCKED</div>
            </div>
            <div class="die-wrapper">
                <span>PINO</span>
                <div id="die-2" class="dice" onclick="rollDice(2)">LOCKED</div>
            </div>
        </div>
        <button onclick="resetBoard()">RESET</button>
    </div>

    <footer>© 2026 AGOS PAYAPA. ALL RIGHTS RESERVED.</footer>

    <script>
        // Service Worker registration for absolute offline access via GitHub Pages
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/dice-app/sw.js', { scope: '/dice-app/' })
                    .then(reg => console.log('Offline mode active!'))
                    .catch(err => console.log('Worker failed', err));
            });
        }

        // Updated mapping based on images
        const dicePools = [
            [
                { name: "Anitu", url: "00_anitu.png" },
                { name: "Halimao", url: "00_halimao.png" },
                { name: "Bagani", url: "00_bagani.png" },
                { name: "Luzon", url: "01_luzon.png" },
                { name: "Visayas", url: "01_visayas.png" },
                { name: "Mindanao", url: "01_mindanao.png" }
            ],
            [
                { name: "Hiwaga", url: "02_hiwaga.png" },
                { name: "Kisig", url: "02_kisig.png" },
                { name: "Sindak", url: "02_sindak.png" },
                { name: "Tabak's Choice", url: "02_tabak_choice.png" },
                { name: "Tabang", url: "02_tabang.png" },
                { name: "Taglay", url: "02_taglay.png" }
            ],
            [
                { name: "HIGHEST Wins", url: "03_high.png" },
                { name: "LOWEST Wins", url: "03_low.png" },
                { name: "[Tabak +1] HIGHEST", url: "03_high_tabak.png" },
                { name: "[Tabak -1] LOWEST", url: "03_low_tabak.png" },
                { name: "[Kalasag +1] HIGHEST", url: "03_high_kalasag.png" },
                { name: "[Kalasag -1] LOWEST", url: "03_low_kalasag.png" }
            ]
        ];

        let currentStep = 0;

        function rollDice(index) {
            if (index !== currentStep) return;

            const dieElement = document.getElementById("die-" + index);
            dieElement.classList.add('rolling');
            dieElement.textContent = "ROLLING...";

            setTimeout(() => {
                const pool = dicePools[index];
                const result = pool[Math.floor(Math.random() * pool.length)];
                
                dieElement.textContent = ""; 
                dieElement.classList.remove('rolling', 'active');
                dieElement.classList.add('rolled');

                const contentDiv = document.createElement("div");
                contentDiv.className = "result-content";
                
                const img = document.createElement("img");
                img.src = result.url;
                img.alt = ""; 

                const label = document.createElement("div");
                label.className = "result-label";
                label.textContent = result.name;

                contentDiv.appendChild(img);
                contentDiv.appendChild(label);
                dieElement.appendChild(contentDiv);

                currentStep++;
                if (currentStep < 3) {
                    const nextDie = document.getElementById("die-" + currentStep);
                    nextDie.classList.add('active');
                    nextDie.textContent = "HANDA";
                }
            }, 800);
        }

        function resetBoard() { location.reload(); }
    </script>
</body>
</html>
